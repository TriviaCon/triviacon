name: Tauri Build

# Native multi-platform build for the Tauri variant (feat/tauri-migration).
# Produces installers/binaries as workflow artifacts.

on:
  workflow_dispatch:
  push:
    branches: [feat/tauri-migration]
    tags: ['tauri-v*']

concurrency:
  group: tauri-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux-x64
            bundles: deb,appimage
          - os: windows-latest
            label: windows-x64
            bundles: nsis,msi
          - os: macos-13
            label: macos-x64
            bundles: dmg
          - os: macos-14
            label: macos-arm64
            bundles: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm tauri build --bundles ${{ matrix.bundles }}

      - uses: actions/upload-artifact@v4
        with:
          name: triviacon-${{ matrix.label }}
          if-no-files-found: ignore
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/dmg/*.dmg
