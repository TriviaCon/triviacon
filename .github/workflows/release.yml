name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_script: build:linux
          - os: windows-latest
            build_script: build:win
          - os: macos-latest
            build_script: build:mac

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        # Version is read from "packageManager" in package.json — don't specify it here.
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run ${{ matrix.build_script }}

      - name: Remove updater artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          gh release view "$TAG" --repo ${{ github.repository }} --json assets --jq '.assets[].name' \
            | grep -E '\.(blockmap|yml)$' \
            | xargs -I{} gh release delete-asset "$TAG" {} --repo ${{ github.repository }} --yes \
            || true
